      /**
       * Robust 'global' polyfill for browser environments.
       * Uses a Proxy to intercept property assignments (like 'fetch') that are read-only
       * on the native 'window' object, preventing crashes in Web3 and polyfill libraries.
       */
      (function() {
        if (typeof window.global === 'undefined') {
          const target = {
            global: null,
            process: { env: {} },
            Buffer: window.Buffer || function() {}
          };
          
          const globalObj = new Proxy(target, {
            get(t, prop) {
              if (prop === 'global') return globalObj;
              if (prop in t) return t[prop];
              const val = window[prop];
              // Bind functions to window to avoid 'Illegal invocation'
              if (typeof val === 'function') return val.bind(window);
              return val;
            },
            set(t, prop, value) {
              t[prop] = value;
              return true;
            },
            has(t, prop) {
              return prop in t || prop in window;
            }
          });
          
          // Ensure fetch is available on the proxy and writable
          target.fetch = window.fetch.bind(window);
          target.global = globalObj;
          
          window.global = globalObj;
        }
      })();
    </script>
